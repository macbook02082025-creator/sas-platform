<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Create an account</h1>
      <p>Start building reliable AI features</p>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-row" style="display: flex; gap: 1rem;">
        <div class="form-group" style="flex: 1;">
          <label for="firstName">First name</label>
          <input id="firstName" type="text" formControlName="firstName" placeholder="Jane">
        </div>
        <div class="form-group" style="flex: 1;">
          <label for="lastName">Last name</label>
          <input id="lastName" type="text" formControlName="lastName" placeholder="Doe">
        </div>
      </div>

      <div class="form-group">
        <label for="organizationName">Organization name</label>
        <input id="organizationName" type="text" formControlName="organizationName" placeholder="Acme Inc.">
      </div>

      <div class="form-group">
        <label for="email">Work email</label>
        <input id="email" type="email" formControlName="email" placeholder="jane@acme.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Min. 8 characters">
      </div>

      <div *ngIf="authStore.error()" class="error-message">
        {{ authStore.error() }}
      </div>

      <button type="submit" [disabled]="signupForm.invalid || authStore.isLoading()" class="btn-primary">
        <span *ngIf="!authStore.isLoading()">Create account</span>
        <span *ngIf="authStore.isLoading()" class="spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="/auth/login">Log in</a></p>
    </div>
  </div>
</div>
